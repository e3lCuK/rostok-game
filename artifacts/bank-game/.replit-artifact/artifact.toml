kind = "web"
previewPath = "/bank/"
title = "TreeBank"
version = "1.0.0"
id = "artifacts/bank-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/bank/" ]
localPort = 22399

[services.development]
run = "pnpm --filter @workspace/bank-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bank-game", "run", "build" ]
publicDir = "artifacts/bank-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22399"
BASE_PATH = "/bank/"

kind = "web"
previewPath = "/"
title = "Tree Idle Game"
version = "1.0.0"
id = "artifacts/tree-idle-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21702

[services.development]
run = "pnpm --filter @workspace/tree-idle-game run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tree-idle-game", "run", "build" ]
publicDir = "artifacts/tree-idle-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21702"
BASE_PATH = "/"
